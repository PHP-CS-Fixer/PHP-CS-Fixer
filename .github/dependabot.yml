version: 2

updates:
  - package-ecosystem: composer
    directory: /dev-tools/
    commit-message:
      prefix: deps
    schedule:
      interval: weekly
      day: friday
      time: '12:30'
      timezone: Europe/Warsaw
    versioning-strategy: increase
    groups:
      phpstan:
        patterns:
          - phpstan/*
      shipmonk:
        patterns:
          - shipmonk/*
  - package-ecosystem: docker
    directory: /
    commit-message:
      prefix: deps
    schedule:
      interval: weekly
      day: friday
      time: '12:30'
      timezone: Europe/Warsaw
    groups:
      all:
        patterns:
          - '*'
  - package-ecosystem: github-actions
    directories:
      - /.github/workflows/
      - /.github/composite-actions/**
    commit-message:
      prefix: deps
    schedule:
      interval: weekly
      day: friday
      time: '12:30'
      timezone: Europe/Warsaw
    groups:
      all:
        patterns:
          - '*'
